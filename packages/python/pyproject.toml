[project]
name = "diffcp"
version = "0.1.0"
description = "Differential Context Protocol (DCP) implementation in Python"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.13.3",
    "pydantic-core>=2.46.3",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.136.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/diffcp"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
]
